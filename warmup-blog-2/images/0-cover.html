<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #1a1a2e;
  }
  .canvas {
    width: 1000px;
    height: 420px;
    background: #fafafa;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 90px;
  }

  /* ---------- left: funnel ---------- */
  .funnel { width: 502px; flex: 0 0 502px; }

  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #9ca3af;
    margin-bottom: 20px;
  }

  .row {
    display: flex;
    align-items: center;
    height: 52px;
    margin-bottom: 12px;
  }
  .row:last-child { margin-bottom: 0; }

  .track { width: 440px; flex: 0 0 440px; }
  .bar {
    height: 52px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    background: #ffffff;
    display: flex;
    align-items: center;
    padding: 0 18px;
    font-family: "SF Mono", "Cascadia Code", "Consolas", "Liberation Mono", monospace;
    font-size: 17px;
    color: #374151;
    white-space: nowrap;
    overflow: visible;
  }
  .count {
    margin-left: 20px;
    width: 42px;
    text-align: right;
    font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    font-size: 20px;
    font-weight: 600;
    color: #9ca3af;
  }

  /* collapsed step: dashed ghost outline = the width it should have had */
  .row.dead .bar {
    border: 2px dashed #e5b783;
    background: transparent;
    color: #b06a12;
    position: relative;
  }
  /* the actual (zero-width) amber bar, pinned at the start of the ghost */
  .row.dead .bar::before {
    content: "";
    position: absolute;
    left: -2px; top: -2px;
    width: 7px; height: 52px;
    background: #e07b00;
    border-radius: 4px 0 0 4px;
  }
  .row.dead .count {
    color: #e07b00;
    font-size: 26px;
    font-weight: 700;
  }

  /* ---------- right: readout ---------- */
  .readout {
    flex: 1;
    display: flex;
    justify-content: flex-end;
  }
  .box {
    border: 2px solid #e07b00;
    border-radius: 12px;
    background: #fff8ef;
    padding: 26px 30px 24px;
    width: 236px;
    text-align: center;
  }
  .box .k {
    font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    font-size: 14px;
    color: #9a6a2a;
    letter-spacing: 0.01em;
  }
  .box .nan {
    font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    font-size: 76px;
    font-weight: 700;
    line-height: 1.05;
    color: #e07b00;
    letter-spacing: -0.02em;
    margin: 10px 0 12px;
  }
  .box .rule {
    height: 1.5px;
    background: #f0dcc2;
    margin: 0 0 12px;
  }
  .box .http {
    font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    font-size: 17px;
    font-weight: 600;
    color: #7a4200;
  }

  /* ---------- bottom caption strip ---------- */
  .strip {
    flex: 0 0 54px;
    border-top: 1.5px solid #e8e8ea;
    display: flex;
    align-items: center;
    padding: 0 90px;
    font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    font-size: 13.5px;
    color: #9ca3af;
    letter-spacing: 0.01em;
  }
  .strip .sep { color: #d1d5db; margin: 0 12px; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="main">
      <div class="funnel">
        <div class="eyebrow">Trace funnel &mdash; step conversion</div>

        <div class="row">
          <div class="track"><div class="bar" style="width: 440px;">agent answer</div></div>
          <div class="count">22</div>
        </div>

        <div class="row">
          <div class="track"><div class="bar" style="width: 380px;">tool search_tool</div></div>
          <div class="count">22</div>
        </div>

        <div class="row dead">
          <div class="track"><div class="bar" style="width: 308px;">chat gpt-4o-mini</div></div>
          <div class="count">0</div>
        </div>
      </div>

      <div class="readout">
        <div class="box">
          <div class="k">conversion_rate</div>
          <div class="nan">NaN</div>
          <div class="rule"></div>
          <div class="http">HTTP 500</div>
        </div>
      </div>
    </div>

    <div class="strip">
      n = 22 traces
      <span class="sep">&middot;</span>
      SigNoz v0.132.2
      <span class="sep">&middot;</span>
      OTel GenAI span naming
    </div>
  </div>
</body>
</html>
