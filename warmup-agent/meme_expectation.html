<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:628px; background:#0a0a0a; overflow:hidden; }
  body {
    font-family: -apple-system, "Segoe UI", Inter, sans-serif;
    display:flex; position:relative;
  }
  .col {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; position:relative;
  }
  .left { background: linear-gradient(160deg, #0f1c14, #0a0a0a); }
  .right { background: linear-gradient(200deg, #24100a, #0a0a0a); }
  .tag {
    font-size:16px; letter-spacing:3px; font-weight:700; text-transform:uppercase;
  }
  .left .tag { color:#4ade80; }
  .right .tag { color:#fb923c; }
  .emoji { font-size:64px; }
  .big {
    font-size:64px; font-weight:800; color:#f5f5f5; font-family:"SF Mono",Consolas,monospace;
  }
  .small { color:#999; font-size:17px; max-width:340px; text-align:center; line-height:1.5; }
  .term-mini {
    background:#111214; border:1px solid #2a2a2a; border-radius:8px;
    padding:12px 16px; font-family:"SF Mono",Consolas,monospace; font-size:13px;
    color:#fb923c; text-align:left; max-width:360px; line-height:1.7;
  }
  .vs {
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:84px; height:84px; border-radius:50%;
    background:#0a0a0a; border:3px solid #262626;
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:22px; color:#e5e5e5; z-index:5;
    box-shadow:0 0 0 8px #0a0a0a;
  }
  .footer {
    position:absolute; bottom:22px; left:0; right:0; text-align:center;
    color:#8a8a8a; font-size:15px; z-index:3;
  }
</style>
</head>
<body>
  <div class="col left">
    <div class="tag">Expectation</div>
    <div class="emoji">⏱️</div>
    <div class="big">2 + 2 = 4</div>
    <div class="small">somewhere comfortably under one second, this is not hard math</div>
  </div>

  <div class="vs">VS</div>

  <div class="col right">
    <div class="tag">Reality</div>
    <div class="emoji">🔥</div>
    <div class="big">20.9s</div>
    <div class="term-mini">
      WARN search_tool: retrying (1/3)<br>
      WARN search_tool: retrying (2/3)<br>
      INFO search_tool: succeeded on attempt 3
    </div>
  </div>

  <div class="footer">the gap is three silent retries nobody asked for</div>
</body>
</html>
